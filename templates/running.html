<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Searching…</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { background: #f0f4f8; }
  </style>
</head>
<body>
<div class="container py-5 text-center" style="max-width: 500px;">

  <div style="background:#003580;border-radius:8px;padding:8px 14px;display:inline-block;margin-bottom:1.5rem;">
    <span style="color:white;font-size:1.4rem;font-weight:700;">UA</span>
  </div>

  <div class="spinner-border text-primary d-block mx-auto mb-3" role="status" style="width:3rem;height:3rem;">
    <span class="visually-hidden">Loading...</span>
  </div>

  <h5 class="fw-bold mb-1">
    Searching {{ job.origin }} &rarr; {{ job.destination }}
  </h5>
  <p class="text-muted mb-1">{{ job.date }}{% if job.return_date %} &rarr; {{ job.return_date }}{% endif %}</p>
  <p class="text-muted small">A Chrome window may open for login — this is normal.</p>

  <div id="error-box" class="alert alert-danger mt-4 d-none"></div>

</div>
<script>
  const jobId = "{{ job_id }}";

  function poll() {
    fetch(`/status/${jobId}`)
      .then(r => r.json())
      .then(data => {
        if (data.status === "done") {
          window.location.href = `/results/${jobId}`;
        } else if (data.status === "error") {
          const box = document.getElementById("error-box");
          box.textContent = "Error: " + data.message;
          box.classList.remove("d-none");
        } else {
          setTimeout(poll, 3000);
        }
      })
      .catch(() => setTimeout(poll, 3000));
  }

  setTimeout(poll, 3000);
</script>
</body>
</html>
