<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>United Fare Availability</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { background: #f0f4f8; }
    .search-card { background: #003580; border-radius: 12px; }
    .search-card label { color: rgba(255,255,255,0.85); font-size: .85rem; margin-bottom: 2px; }
  </style>
</head>
<body>
<div class="container py-5" style="max-width: 700px;">

  <div class="d-flex align-items-center mb-4 gap-3">
    <div style="background:#003580;border-radius:8px;padding:8px 14px;">
      <span style="color:white;font-size:1.4rem;font-weight:700;">UA</span>
    </div>
    <div>
      <h4 class="mb-0 fw-bold">United Fare Availability</h4>
      <small class="text-muted">Expert Mode fare class scraper</small>
    </div>
  </div>

  <div class="search-card p-4 shadow-sm">
    <form method="POST" action="/search">

      <div class="mb-3 d-flex gap-3">
        <div class="form-check">
          <input class="form-check-input" type="radio" name="trip_type" id="oneway" value="oneway"
            checked onchange="toggleReturn(this.value)">
          <label class="form-check-label text-white" for="oneway">One-way</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="trip_type" id="roundtrip" value="roundtrip"
            onchange="toggleReturn(this.value)">
          <label class="form-check-label text-white" for="roundtrip">Round-trip</label>
        </div>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-6">
          <label for="username">MileagePlus Username</label>
          <input type="text" class="form-control" id="username" name="username" placeholder="Username" required />
        </div>
        <div class="col-6">
          <label for="password">Password</label>
          <input type="password" class="form-control" id="password" name="password" placeholder="Password" required />
        </div>
      </div>

      <div class="row g-3">
        <div class="col-6 col-md-3">
          <label for="origin">From</label>
          <input type="text" class="form-control text-uppercase" id="origin" name="origin"
            placeholder="e.g. ORD" maxlength="3" required />
        </div>

        <div class="col-6 col-md-3">
          <label for="destination">To</label>
          <input type="text" class="form-control text-uppercase" id="destination" name="destination"
            placeholder="e.g. LAX" maxlength="3" required />
        </div>

        <div class="col-6 col-md-3">
          <label for="depart_date">Depart</label>
          <input type="date" class="form-control" id="depart_date" name="depart_date" required />
        </div>

        <div class="col-6 col-md-3">
          <label for="end_date">End Date <span style="opacity:.6;font-size:.8em;">(optional range)</span></label>
          <input type="date" class="form-control" id="end_date" name="end_date" />
        </div>

        <div class="col-6 col-md-3" id="return-date-wrapper" style="opacity:0.3;pointer-events:none;">
          <label for="return_date">Return</label>
          <input type="date" class="form-control" id="return_date" name="return_date" />
        </div>

        <div class="col-6 col-md-3">
          <label for="fare_filter">Filter class</label>
          <input type="text" class="form-control text-uppercase" id="fare_filter" name="fare_filter"
            placeholder="e.g. PZ" maxlength="2" />
        </div>

        <div class="col-12 col-md-4 d-flex align-items-end">
          <button type="submit" class="btn btn-warning fw-bold w-100" style="height:38px;">
            Search Flights
          </button>
        </div>
      </div>

    </form>
  </div>

</div>
<script>
  function toggleReturn(val) {
    const wrapper = document.getElementById('return-date-wrapper');
    const input   = document.getElementById('return_date');
    if (val === 'roundtrip') {
      wrapper.style.opacity      = '1';
      wrapper.style.pointerEvents = 'auto';
      input.required = true;
    } else {
      wrapper.style.opacity      = '0.3';
      wrapper.style.pointerEvents = 'none';
      input.required = false;
      input.value    = '';
    }
  }
</script>
</body>
</html>
